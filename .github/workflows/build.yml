name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q src main.py scripts

      - name: Smoke imports sem GUI
        env:
          AUTH_ENABLED: "false"
        run: |
          python -c "import src.core.config; import src.core.database; import src.core.models; print('core/models ok')"

  package-windows:
    name: Empacotar Loglife (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependências e PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "pyinstaller>=6.3,<7"

      - name: PyInstaller (onefile)
        run: pyinstaller --noconfirm Loglife.spec

      - name: Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: Loglife-Windows-x64-${{ github.run_number }}
          path: dist/Loglife.exe
          if-no-files-found: error
          retention-days: 30

      - name: Resumo — onde baixar o .exe
        shell: bash
        env:
          N: Loglife-Windows-x64-${{ github.run_number }}
        run: |
          {
            echo "### Artefato gerado"
            echo "No repositório: **Actions** → esta execução → seção **Artifacts** no rodapé da página → baixe o zip **$N** (contém \`Loglife.exe\`)."
            echo ""
            echo "Configure credenciais com variáveis de ambiente do Windows ou um ficheiro \`.env\` **só na máquina do utilizador** (não partilhe secretos por e-mail). Ver \`.env.example\`."
          } >> "$GITHUB_STEP_SUMMARY"
