{% extends "base.html" %}

{% block title %}Criar Conta - DocFlow{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 40px auto 0 auto; width: 100%;">
    <div style="text-align: center; margin-bottom: 24px;">
        <span style="font-size: 40px; filter: drop-shadow(0 0 10px var(--primary-glow));">⚡</span>
        <h1 style="font-size: 32px; font-weight: 800; margin-top: 10px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">DocFlow</h1>
        <p style="color: var(--text-secondary); margin-top: 8px; font-size: 15px;">Sistema de Controle de Versões de Documentos</p>
    </div>
    
    <div class="card">
        <h2 style="justify-content: center; border-bottom: none; margin-bottom: 24px;">Criar Nova Conta</h2>

        {% if error %}
        <div class="alert alert-error" style="margin-bottom: 20px;">
            <span>❌</span> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="name">Nome completo</label>
                <input type="text" id="name" name="name" required placeholder="Ex: Roberto Silva" autofocus>
            </div>

            <div class="form-group">
                <label for="email">E-mail corporativo</label>
                <input type="email" id="email" name="email" required placeholder="nome.sobrenome@empresa.com">
            </div>

            <div class="form-group">
                <label for="password">Senha de acesso</label>
                <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirmar Senha</label>
                <input type="password" id="password_confirm" name="password_confirm" required placeholder="Repita a senha">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; margin-top: 10px;">Cadastrar e Acessar</button>
        </form>

        <div style="text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 14px; color: var(--text-secondary);">
            Já possui cadastro? <a href="{{ url_for('auth.login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='var(--secondary)'" onmouseout="this.style.color='var(--primary)'">Acessar sistema</a>
        </div>
    </div>
</div>
{% endblock %}
