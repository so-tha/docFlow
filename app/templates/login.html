{% extends "base.html" %}

{% block title %}Entrar - DocFlow{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 60px auto 0 auto; width: 100%;">
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="font-size: 32px; font-weight: 800; margin-top: 10px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">DocFlow</h1>
        <p style="color: var(--text-secondary); margin-top: 8px; font-size: 15px;">Controle de versão de planilhas.</p>
    </div>
    
    <div class="card">
        <h2 style="justify-content: center; border-bottom: none; margin-bottom: 24px;">Acessar sua Conta</h2>

        {% if error %}
        <div class="alert alert-error" style="margin-bottom: 20px;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="email">E-mail corporativo</label>
                <input type="email" id="email" name="email" required autofocus placeholder="seu.nome@empresa.com">
            </div>

            <div class="form-group">
                <label for="password">Senha de acesso</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <div class="form-group" style="margin-top: -5px; margin-bottom: 24px;">
                <label style="display: flex; align-items: center; font-weight: 400; cursor: pointer; color: var(--text-secondary); font-size: 13px;">
                    <input type="checkbox" name="remember" style="margin-right: 8px;">
                    Lembrar credenciais neste dispositivo
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Entrar no Sistema</button>
        </form>

        <div style="text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-color); font-size: 14px; color: var(--text-secondary);">
            Novo usuário? <a href="{{ url_for('auth.register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='var(--secondary)'" onmouseout="this.style.color='var(--primary)'">Criar nova conta</a>
        </div>
    </div>
</div>
{% endblock %}
